<header id="page-topbar" [class.sidebar-collapsed]="sidebarCollapsed">
  <div class="navbar-header">
    <div class="d-flex">
      <!-- App Search-->
      <form class="app-search d-none d-lg-block">
        <div class="position-relative">
          <input class="form-control" placeholder="Search..." type="text"/>
          <button class="btn btn-primary" type="button">
            <i class="bx bx-search-alt align-middle"></i>
          </button>
        </div>
      </form>
    </div>
    <div class="d-flex">
      <div class="dropdown d-inline-block d-lg-none ms-2">
        <button aria-expanded="false" aria-haspopup="true" class="btn header-item" data-bs-toggle="dropdown" type="button">
          <i class="icon-lg" data-feather="search"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
          <form class="p-3">
            <div class="form-group m-0">
              <div class="input-group">
                <input class="form-control" placeholder="Search ..." type="text"/>
                <button class="btn btn-primary" type="submit">
                  <i class="mdi mdi-magnify"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="dropdown d-none d-sm-inline-block">
        <button class="btn header-item" id="mode-setting-btn" type="button">
          <i class="icon-lg layout-mode-dark" data-feather="moon"></i>
          <i class="icon-lg layout-mode-light" data-feather="sun"></i>
        </button>
      </div>
      <div class="dropdown d-inline-block">
        <button aria-expanded="false" aria-haspopup="true" class="btn header-item noti-icon position-relative" data-bs-toggle="dropdown" type="button">
          <i class="icon-lg" data-feather="bell"></i>
          <span class="badge bg-danger rounded-pill">5</span>
        </button>
        <div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0">
          <div class="p-3">
            <div class="row align-items-center">
              <div class="col">
                <h6 class="m-0">Notifications</h6>
              </div>
              <div class="col-auto">
                <a class="small text-reset text-decoration-underline" href="#!">Unread (3)</a>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="dropdown d-inline-block">
        <button aria-expanded="false" aria-haspopup="true" class="btn header-item bg-light-subtle border-start border-end" data-bs-toggle="dropdown" type="button">
          <img alt="Header Avatar" class="rounded-circle header-profile-user" src="assets/images/users/avatar-1.jpg"/>
          <span class="d-none d-xl-inline-block ms-1 fw-medium">EduPulse</span>
          <i class="mdi mdi-chevron-down d-none d-xl-inline-block"></i>
        </button>
        <div class="dropdown-menu dropdown-menu-end">
          <a class="dropdown-item" href="#">
            <i class="mdi mdi mdi-face-man font-size-16 align-middle me-1"></i>
            Profile
          </a>
          <a class="dropdown-item" href="#">
            <i class="mdi mdi-lock font-size-16 align-middle me-1"></i>
            Lock Screen
          </a>
          <div class="dropdown-divider"></div>
          <a class="dropdown-item" href="#">
            <i class="mdi mdi-logout font-size-16 align-middle me-1"></i>
            Logout
          </a>
        </div>
      </div>
    </div>
  </div>
</header>
