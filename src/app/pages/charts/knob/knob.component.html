<div class="container-fluid">
  <!-- start page title -->
  <div class="row">
    <div class="col-12">
      <div class="page-title-box d-sm-flex align-items-center justify-content-between">
        <h4 class="mb-sm-0 font-size-18">Jquery Knob</h4>
        <div class="page-title-right">
          <ol class="breadcrumb m-0">
            <li class="breadcrumb-item"><a href="javascript: void(0);">Charts</a></li>
            <li class="breadcrumb-item active">Jquery Knob</li>
          </ol>
        </div>
      </div>
    </div>
  </div>
  <!-- end page title -->

  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-header">
          <h4 class="card-title">Examples</h4>
          <p class="card-title-desc">Nice, downward compatible, touchable, jQuery dial</p>
        </div>
        <div class="card-body">
          <div class="row">
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Disable display input</h5>
                <input class="knob" data-displayinput="false" data-fgcolor="#5156be" data-width="150" value="35"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Cursor mode</h5>
                <input class="knob" data-cursor="true" data-fgcolor="#2ab57d" data-width="150" value="29"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Display previous value</h5>
                <input class="knob" data-displayprevious="true" data-fgcolor="#4ba6ef" data-min="-100" data-width="150" value="44"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Angle offset</h5>
                <input class="knob" data-angleoffset="90" data-fgcolor="#f1734f" data-linecap="round" data-width="150" value="35"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">5-digit values, step 1000</h5>
                <input class="knob" data-displayprevious="true" data-fgcolor="#ffbf53" data-max="15000" data-min="-15000" data-step="1000" data-width="150" value="-11000"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Angle offset and arc</h5>
                <input class="knob" data-cursor="true" data-fgcolor="#fd625e" data-width="150" value="29"/>
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Readonly</h5>
                <input class="knob" data-angleoffset="180" data-fgcolor="#f06292" data-height="150" data-linecap="round" data-readonly="true" data-skin="tron" data-thickness=".1" data-width="150" value="80">
              </div>
            </div>
            <div class="col-xl-4 col-sm-6">
              <div class="text-center" dir="ltr">
                <h5 class="font-size-14 mb-3">Angle offset and arc</h5>
                <input class="knob" data-anglearc="250" data-angleoffset="-125" data-cursor="true" data-displayprevious="true" data-fgcolor="#8d6e63" data-height="150" data-skin="tron" data-thickness=".2" data-width="150" value="44">
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- end col -->
  </div>
  <!-- end row -->
</div>
